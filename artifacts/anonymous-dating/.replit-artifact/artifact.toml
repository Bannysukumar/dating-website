kind = "web"
previewPath = "/"
title = "Anonymous Dating & Video Chat"
version = "1.0.0"
id = "artifacts/anonymous-dating"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25877

[services.development]
run = "pnpm --filter @workspace/anonymous-dating run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anonymous-dating", "run", "build" ]
publicDir = "artifacts/anonymous-dating/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25877"
BASE_PATH = "/"
