openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Anonymous Dating & Video Chat API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Platform statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform stats
      description: Returns number of online users and active matches
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PlatformStats:
      type: object
      properties:
        onlineUsers:
          type: integer
          description: Total number of connected users
        activeMatches:
          type: integer
          description: Number of active chat/video matches
        waitingUsers:
          type: integer
          description: Number of users in matchmaking queue
      required:
        - onlineUsers
        - activeMatches
        - waitingUsers
